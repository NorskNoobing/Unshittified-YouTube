<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Config Tools - Unshittified YouTube</title>
  <link rel="stylesheet" href="../styles/config-tools.css">
</head>
<body>
  <main class="tools">
    <header class="title-row">
      <img class="title-logo" src="../../assets/icons/icon-128.png" alt="Unshittified YouTube logo" width="36" height="36">
      <div>
        <h1 class="title">Config Tools</h1>
        <p class="intro">Import and export settings for Unshittified YouTube.</p>
      </div>
    </header>

    <div class="actions">
      <button id="exportConfig" class="action-btn" type="button">Export settings</button>
      <button id="importConfigButton" class="action-btn" type="button">Import settings</button>
      <input id="importConfigFile" type="file" accept=".json,application/json" hidden>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>
  <script src="../scripts/settings-schema.js"></script>
  <script src="../scripts/config-tools.js"></script>
</body>
</html>
