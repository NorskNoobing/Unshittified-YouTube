<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unshittified YouTube</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
  <main class="popup">
    <div class="title-row">
      <img class="title-logo" src="../../assets/icons/icon-128.png" alt="Unshittified YouTube logo" width="30" height="30">
      <h1 class="title">Unshittified YouTube</h1>
    </div>

    <div class="section-nav" role="tablist" aria-label="Settings sections">
      <button class="section-btn is-active" type="button" data-section="general">General</button>
      <button class="section-btn" type="button" data-section="watch">Watch page</button>
      <button class="section-btn" type="button" data-section="sidebar">Sidebar</button>
      <button class="section-btn" type="button" data-section="subscriptions">Subscriptions page</button>
    </div>

    <section class="section-panel is-active" data-panel="general">
      <label class="toggle">
        <input id="hideCountryCode" type="checkbox">
        <span>Hide country code next to logo</span>
      </label>
      <label class="toggle">
        <input id="hideVoiceSearchButton" type="checkbox">
        <span>Hide voice search button</span>
      </label>
      <label class="toggle">
        <input id="addReportHistoryToProfileMenu" type="checkbox">
        <span>Add "Report history" to profile menu</span>
      </label>

      <section class="config-tools" aria-label="Config tools">
        <h2 class="subheading">Config</h2>
        <div class="config-actions">
          <button id="openConfigTools" class="config-btn" type="button">Open Config Tools</button>
        </div>
        <p class="config-help">Import and export settings from the Config Tools page.</p>
        <p id="configStatus" class="config-status" role="status" aria-live="polite"></p>
      </section>
    </section>

    <section class="section-panel" data-panel="watch">
      <label class="setting-row" for="shareButtonMode">
        <span>Share button</span>
        <select id="shareButtonMode" class="setting-select">
          <option value="default">YouTube default</option>
          <option value="row">Always in row</option>
          <option value="menu">Only in "..." menu</option>
          <option value="hide">Hide</option>
        </select>
      </label>
      <label class="setting-row" for="saveButtonMode">
        <span>Save button</span>
        <select id="saveButtonMode" class="setting-select">
          <option value="default">YouTube default</option>
          <option value="row">Always in row</option>
          <option value="menu">Only in "..." menu</option>
          <option value="hide">Hide</option>
        </select>
      </label>
      <label class="setting-row" for="thanksButtonMode">
        <span>Thanks button</span>
        <select id="thanksButtonMode" class="setting-select">
          <option value="default">YouTube default</option>
          <option value="row">Always in row</option>
          <option value="menu">Only in "..." menu</option>
          <option value="hide">Hide</option>
        </select>
      </label>
      <label class="toggle">
        <input id="hideRemoveAdsButton" type="checkbox">
        <span>Hide "Remove ads" in "..." menu</span>
      </label>
      <label class="toggle">
        <input id="hideJoinButton" type="checkbox">
        <span>Hide channel "Join" button</span>
      </label>
    </section>

    <section class="section-panel" data-panel="sidebar">
      <label class="toggle">
        <input id="hideSubscriptionChannels" type="checkbox">
        <span>Hide channels under "Subscriptions" button</span>
      </label>
      <label class="toggle">
        <input id="hideExploreSection" type="checkbox">
        <span>Hide "Explore" section</span>
      </label>
      <label class="toggle">
        <input id="hideMoreFromYoutubeSection" type="checkbox">
        <span>Hide "More from YouTube" section</span>
      </label>
      <label class="toggle">
        <input id="hideSettingsHelpSection" type="checkbox">
        <span>Hide support section</span>
      </label>
      <label class="toggle">
        <input id="hideSidebarFooter" type="checkbox">
        <span>Hide sidebar footer</span>
      </label>
    </section>

    <section class="section-panel" data-panel="subscriptions">
      <label class="toggle">
        <input id="hideMostRelevantSection" type="checkbox">
        <span>Hide "Most relevant" shelf</span>
      </label>
      <label class="toggle">
        <input id="hideShortsSection" type="checkbox">
        <span>Hide Shorts shelf</span>
      </label>
    </section>
  </main>
  <script src="../scripts/settings-schema.js"></script>
  <script src="../scripts/popup.js"></script>
</body>
</html>
