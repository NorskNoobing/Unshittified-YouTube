<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Tweaks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <h1 class="title">YouTube Tweaks</h1>

    <div class="section-nav" role="tablist" aria-label="Settings sections">
      <button class="section-btn is-active" type="button" data-section="general">General</button>
      <button class="section-btn" type="button" data-section="sidebar">Sidebar</button>
      <button class="section-btn" type="button" data-section="subscriptions">Subscriptions page</button>
    </div>

    <section class="section-panel is-active" data-panel="general">
      <label class="toggle">
        <input id="hideCountryCode" type="checkbox">
        <span>Hide country code next to logo</span>
      </label>
      <label class="toggle">
        <input id="hideVoiceSearchButton" type="checkbox">
        <span>Hide voice search button</span>
      </label>
    </section>

    <section class="section-panel" data-panel="sidebar">
      <label class="toggle">
        <input id="hideExploreSection" type="checkbox">
        <span>Hide "Explore" section</span>
      </label>
      <label class="toggle">
        <input id="hideMoreFromYoutubeSection" type="checkbox">
        <span>Hide "More from YouTube" section</span>
      </label>
    </section>

    <section class="section-panel" data-panel="subscriptions">
      <label class="toggle">
        <input id="hideMostRelevantSection" type="checkbox">
        <span>Hide "Most relevant" shelf</span>
      </label>
      <label class="toggle">
        <input id="hideShortsSection" type="checkbox">
        <span>Hide Shorts shelves</span>
      </label>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
